name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install mops
        run: curl -LsSf https://mops.one/cli/install.sh | sh

      - name: Install Motoko toolchain
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          mops toolchain init

      - name: Run Motoko tests
        run: bash scripts/run-tests.sh
